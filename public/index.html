<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blockchain Tutorials</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .hub-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            padding: 2rem;
        }
        .hub-page h1 {
            color: #eee;
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 600;
            margin-bottom: 2.5rem;
            text-align: center;
        }
        .hub-buttons {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
            max-width: 640px;
        }
        .hub-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 140px;
            padding: 2.5rem 3rem;
            border: none;
            border-radius: 16px;
            font-size: 1.75rem;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }
        .hub-button:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.4);
        }
        .hub-button:active {
            transform: translateY(0);
        }
        .hub-button-label {
            display: block;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            margin-bottom: 0.35rem;
        }
        .hub-button-desc {
            font-size: 0.95rem;
            font-weight: 400;
            opacity: 0.9;
        }
        .hub-button-ethereum {
            background: linear-gradient(135deg, #627eea 0%, #4c5fd5 50%, #3b4bce 100%);
        }
        .hub-button-ethereum:hover {
            background: linear-gradient(135deg, #7288eb 0%, #5c6fe0 50%, #4a5bd4 100%);
        }
        .hub-button-xrpl {
            background: linear-gradient(135deg, #23292d 0%, #1a1f22 50%, #0d1113 100%);
            border: 2px solid #2d3439;
        }
        .hub-button-xrpl:hover {
            background: linear-gradient(135deg, #2d3439 0%, #23292d 50%, #1a1f22 100%);
            border-color: #3d454a;
        }
        .hub-button-concepts {
            background: linear-gradient(135deg, #2c5282 0%, #2b6cb0 50%, #3182ce 100%);
        }
        .hub-button-concepts:hover {
            background: linear-gradient(135deg, #3182ce 0%, #2c5282 50%, #2b6cb0 100%);
        }
    </style>
</head>
<body class="hub-page">
    <h1>Choose a section</h1>
    <div class="hub-buttons">
        <a href="/blockchain-concepts/public-key-cryptography/intro.html" class="hub-button hub-button-concepts">
            <span class="hub-button-label">Blockchain Concepts</span>
            <span class="hub-button-desc">Public key crypto, distributed ledgers &amp; consensus</span>
        </a>
        <a href="/ethereum/intro.html" class="hub-button hub-button-ethereum">
            <span class="hub-button-label">Ethereum</span>
            <span class="hub-button-desc">Accounts, transactions, consensus, smart contracts &amp; tokenization</span>
        </a>
        <a href="/xrpl/intro.html" class="hub-button hub-button-xrpl">
            <span class="hub-button-label">XRPL</span>
            <span class="hub-button-desc">Accounts, transactions &amp; consensus on the XRP Ledger</span>
        </a>
    </div>
</body>
</html>
